<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boîte Mail - Festival</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f5f5;
        overflow: hidden;
    }

    .container {
        display: flex;
        height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
        width: 240px;
        background-color: #0078d4;
        color: white;
        padding: 20px;
        overflow-y: auto;
    }

    .sidebar h2 {
        margin-top: 0;
        font-size: 20px;
    }

    .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .sidebar li {
        padding: 10px 0;
        cursor: pointer;
    }

    .sidebar li:hover {
        text-decoration: underline;
    }

    /* ===== MAIN ===== */
    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        background-color: white;
        min-width: 0;
    }

    .header {
        padding: 15px;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
    }

    .header h2 {
        margin: 0;
        font-size: 20px;
    }

    .search-box {
        padding: 10px;
        width: 300px;
        max-width: 100%;
        border: 1px solid #ccc;
        border-radius: 6px;
    }

    /* ===== MAIL LIST ===== */
    .mail-list {
        width: 100%;
        max-height: 40%;
        overflow-y: auto;
        border-bottom: 1px solid #e0e0e0;
    }

    .mail-item {
        padding: 14px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
    }

    .mail-item:hover {
        background-color: #f5f5f5;
    }

    .mail-item.unread {
        background-color: #e8f4fd;
        font-weight: bold;
    }

    .mail-item-left {
        flex: 1;
        min-width: 0;
    }

    .mail-sender {
        display: block;
        font-weight: bold;
        margin-bottom: 4px;
    }

    .mail-subject {
        display: block;
        color: #333;
        word-break: break-word;
    }

    .mail-date {
        color: #666;
        font-size: 12px;
        white-space: nowrap;
    }

    /* ===== CONTENT ===== */
    .mail-content {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
    }

    .mail-header {
        margin-bottom: 20px;
    }

    .mail-sender-info {
        font-weight: bold;
        font-size: 16px;
        word-break: break-word;
    }

    .mail-subject-info {
        font-size: 22px;
        margin: 10px 0;
        word-break: break-word;
    }

    .mail-date-info {
        color: #666;
        font-size: 13px;
    }

    .mail-body {
        line-height: 1.7;
        font-size: 16px;
    }

    .mail-body img,
    .mail-body table {
        max-width: 100%;
    }

    .morse-table {
        border-collapse: collapse;
        width: 100%;
        margin: 15px 0;
        overflow-x: auto;
        display: block;
    }

    .morse-table th,
    .morse-table td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
        white-space: nowrap;
    }

    .morse-table th {
        background-color: #f2f2f2;
    }

    .code-block {
        background-color: #f8f8f8;
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 6px;
        font-family: monospace;
        overflow-x: auto;
        margin: 12px 0;
        font-size: 14px;
    }

    /* ===== MOBILE ===== */
    @media screen and (max-width: 768px) {

        body {
            overflow: auto;
        }

        .container {
            flex-direction: column;
            height: auto;
            min-height: 100vh;
        }

        .sidebar {
            width: 100%;
            padding: 15px;
        }

        .sidebar ul {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding-bottom: 5px;
        }

        .sidebar li {
            white-space: nowrap;
            padding: 5px 0;
        }

        .header {
            flex-direction: column;
            align-items: stretch;
        }

        .search-box {
            width: 100%;
        }

        .mail-list {
            max-height: 300px;
        }

        .mail-item {
            flex-direction: column;
            align-items: flex-start;
        }

        .mail-date {
            margin-top: 5px;
        }

        .mail-content {
            padding: 15px;
        }

        .mail-subject-info {
            font-size: 20px;
        }

        .mail-body {
            font-size: 15px;
        }

        .code-block {
            font-size: 12px;
        }
    }
</style>
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>Boîte de réception</h2>

        <ul>
            <li>Nouveau message</li>
            <li>Boîte de réception</li>
            <li>Envoyés</li>
            <li>Brouillons</li>
            <li>Corbeille</li>
        </ul>
    </div>

    <div class="main-content">

        <div class="header">
            <h2>Boîte de réception</h2>

            <input
                type="text"
                class="search-box"
                placeholder="Rechercher un message..."
            >
        </div>

        <div class="mail-list" id="mailList">

            <div class="mail-item unread" onclick="showMail(0)">
                <div class="mail-item-left">
                    <span class="mail-sender">Anonyme</span>
                    <span class="mail-subject">Les bases du piratage</span>
                </div>

                <span class="mail-date">Aujourd'hui</span>
            </div>

            <div class="mail-item unread" onclick="showMail(1)">
                <div class="mail-item-left">
                    <span class="mail-sender">Dr Grippe</span>
                    <span class="mail-subject">
                        Résultats de votre consultation
                    </span>
                </div>

                <span class="mail-date">10:30</span>
            </div>

        </div>

        <div class="mail-content" id="mailContent">
            <!-- Contenu -->
        </div>

    </div>

</div>

<script>
    const mails = [
        {
            sender: "Anonyme",
            subject: "Les bases du piratage",
            date: "Aujourd'hui",
            body: `
                <p>Bienvenue Agent Zic.</p>

                <p>
                    Cette version est désormais totalement responsive mobile.
                </p>

                <div class="code-block">
                    console.log("Responsive mobile activé");
                </div>
            `
        },

        {
            sender: "Dr Grippe",
            subject: "Résultats de votre consultation",
            date: "10:30",
            body: `
                <p>
                    Votre interface fonctionne maintenant parfaitement
                    sur smartphone.
                </p>
            `
        }
    ];

    function showMail(index) {

        const mail = mails[index];
        const mailContent = document.getElementById('mailContent');

        const mailItems = document.querySelectorAll('.mail-item');
        mailItems[index].classList.remove('unread');

        mailContent.innerHTML = `
            <div class="mail-header">

                <div class="mail-sender-info">
                    ${mail.sender}
                </div>

                <div class="mail-subject-info">
                    ${mail.subject}
                </div>

                <div class="mail-date-info">
                    ${mail.date}
                </div>

            </div>

            <div class="mail-body">
                ${mail.body}
            </div>
        `;
    }

    showMail(0);
</script>

</body>
</html>
