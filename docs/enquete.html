<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boîte Mail - Festival</title>
    <style>
        :root {
            --primary: #0078d4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .container { display: flex; height: 100vh; }

        .sidebar {
            width: 250px;
            background-color: var(--primary);
            color: white;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 18px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .sidebar li:hover, .sidebar li.active {
            background: rgba(255,255,255,0.2);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: white;
        }

        .header {
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            font-size: 26px;
            padding: 4px 8px;
            cursor: pointer;
        }

        .search-box {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        .mail-list {
            flex: 1;
            overflow-y: auto;
            border-right: 1px solid #e0e0e0;
        }

        .mail-item {
            padding: 16px 18px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .mail-item:hover { background-color: #f9f9f9; }
        .mail-item.unread { background-color: #e8f4fd; font-weight: 600; }

        .mail-sender { font-weight: bold; }
        .mail-subject { flex: 1; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .mail-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; padding: 12px 16px; order: -1; }
            .sidebar ul { display: flex; flex-wrap: wrap; gap: 8px; }
            .sidebar li { padding: 8px 14px; border-radius: 9999px; }

            .back-btn { display: block; }
            .mail-list { border-right: none; border-bottom: 1px solid #e0e0e0; max-height: 45vh; flex: none; }
            .mail-content { padding: 18px 20px; }
            .mail-body { font-size: 17.5px; line-height: 1.8; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Boîte de réception</h2>
            <ul>
                <li onclick="newMessage()">Nouveau message</li>
                <li onclick="showInbox()" class="active" id="inbox-link">Boîte de réception</li>
                <li onclick="alert('Section Envoyés')">Envoyés</li>
                <li onclick="alert('Section Brouillons')">Brouillons</li>
                <li onclick="alert('Section Corbeille')">Corbeille</li>
            </ul>
        </div>

        <div class="main-content">
            <div class="header">
                <button class="back-btn" onclick="goBackToList()">←</button>
                <h2 id="headerTitle">Boîte de réception</h2>
                <input type="text" class="search-box" placeholder="Rechercher un message...">
            </div>

            <div class="mail-list" id="mailList"></div>
            <div class="mail-content" id="mailContent"></div>
        </div>
    </div>

    <script>
        const mails = [ /* === TES MAILS ORIGINAUX === */ 
            {
                sender: "Anonyme <no-reply@darkweb.org>",
                subject: "Les bases du piratage",
                date: "Aujourd'hui",
                body: `<p>Agent Zic,</p><p>Voici un rappel des bases en <strong>HTML, Java et PHP</strong>...</p>` // (raccourci pour lisibilité)
            },
            {
                sender: "Dr Grippe <dr.grippe@clinique.fr>",
                subject: "Résultats de votre consultation - Allergie à l'alcool",
                date: "10:30",
                body: `<p>Bonjour Mr Zic,</p><p>Votre allergie à l'alcool s'aggrave malheureusement...</p>`
            },
            {
                sender: "Mr X <dr.x@festival.org>",
                subject: "Bon festival !",
                date: "Hier",
                body: `<p>Salut Jacques,</p><p>Je te souhaite un excellent festival !...</p>`
            },
            {
                sender: "Agence Espionne <formation@espionnage.pro>",
                subject: "Espion pour les nuls - Rappel code Morse",
                date: "Lun 15",
                body: `<p>Agent Zic,</p><p>Voici un rappel du code Morse...</p>`
            },
            {
                sender: "Jacquie et Michel <service@jacquieetmichel.fr>",
                subject: "Renouvellement abonnement",
                date: "Ven 12",
                body: `<p>Bonjour Lilian Bouvet,</p><p>Votre abonnement a été automatiquement renouvelé...</p>`
            },
            {
                sender: "Anonyme <shadow@unknown.org>",
                subject: "Confidentiel",
                date: "Maintenant",
                body: `
                    <p><strong>Agent Zic,</strong></p>
                    <p>Informations hautement confidentielles.</p>
                    <p>Voici la photo que tu as demandée :</p>
                    <img src="image/electro.png" alt="Electro">
                    <p>Utilise-la avec prudence.</p>
                    <p><em>— Un allié dans l'ombre</em></p>
                `
            }
        ];

        function renderMailList() {
            const list = document.getElementById('mailList');
            list.innerHTML = '';

            mails.forEach((mail, index) => {
                const div = document.createElement('div');
                div.className = `mail-item ${index < 3 ? 'unread' : ''}`;
                div.innerHTML = `
                    <div style="flex:1; min-width:0;">
                        <div class="mail-sender">${mail.sender.split('<')[0].trim()}</div>
                        <div class="mail-subject">${mail.subject}</div>
                    </div>
                    <div class="mail-date">${mail.date}</div>
                `;
                div.onclick = () => showMail(index);
                list.appendChild(div);
            });
        }

        function showMail(index) {
            const mail = mails[index];
            const content = document.getElementById('mailContent');
            const list = document.getElementById('mailList');

            content.innerHTML = `
                <div class="mail-header">
                    <div class="mail-sender-info">${mail.sender}</div>
                    <div class="mail-subject-info">${mail.subject}</div>
                    <div class="mail-date-info">${mail.date}</div>
                </div>
                <div class="mail-body">${mail.body}</div>
            `;

            list.style.display = 'none';
            content.style.display = 'block';
            document.getElementById('headerTitle').textContent = mail.subject;
        }

        function goBackToList() {
            document.getElementById('mailList').style.display = 'block';
            document.getElementById('mailContent').style.display = 'none';
            document.getElementById('headerTitle').textContent = 'Boîte de réception';
        }

        function showInbox() {
            goBackToList();
        }

        function newMessage() {
            alert("✉️ Nouveau message - Fonctionnalité à venir");
        }

        // Initialisation
        window.onload = () => {
            renderMailList();
        };
    </script>
</body>
</html>
